<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Student Marketplace</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-bg">

<div class="auth-container">

    <div class="auth-card">
        <div class="mb-3">
    <a href="index.html" class="btn btn-outline-success btn-sm">
        ← Back to Home
    </a>
</div>
        <h3 class="text-center fw-bold">Welcome Back!</h3>
        <p class="text-center text-muted">Login to your account</p>

        
        <form id="loginForm">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <span class="input-group-text"><i class="bi bi-eye"></i></span>
                </div>
            </div>

            <div class="d-flex justify-content-between mb-3">
                <div>
                    <input type="checkbox"> Remember me
                </div>
                <a href="#" class="small text-success">Forgot Password?</a>
            </div>

            
            <button type="submit" class="btn btn-success w-100">Login</button>

        </form>

        <p class="text-center mt-3">
            Don't have an account?
            <a href="register.html" class="text-success fw-bold">Register</a>
        </p>
    </div>

</div>


<script src="js/auth.js"></script>

</body>
</html>
