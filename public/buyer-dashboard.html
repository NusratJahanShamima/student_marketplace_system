<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buyer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/seller_dashboard.css"> 
</head>

<body>


<nav class="navbar navbar-light bg-white shadow-sm fixed-top px-4">

    <span class="navbar-brand fw-bold text-success fs-4">
        <i class="bi bi-cart"></i> Student Marketplace
    </span>

    <div class="d-flex align-items-center">

        
        <div class="position-relative me-4">
            <i class="bi bi-bell fs-5"></i>
            <span class="badge bg-danger badge-notify" style="display:none;">0</span>
        </div>

        
        <div class="d-flex align-items-center">
            <i class="bi bi-person-circle fs-4 me-2"></i>
            <span class="username fw-bold"></span>
        </div>

    </div>

</nav>



<div class="sidebar">

    <ul class="nav flex-column mt-4">

        <li><a class="nav-link active" ><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li><a class="nav-link" href="chat.html"><i class="bi bi-chat"></i> Messages</a></li>

        <li><a class="nav-link" href="saved.html"><i class="bi bi-bookmark"></i> Saved Items</a></li>

        <li><a class="nav-link" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>

         <li><a class="nav-link" href="buy_sell.html"><i class="bi bi-arrow-left"></i> Back Buy/Sell</a></li>

        <li class="mt-3">
            <a class="nav-link text-danger" href="#" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </li>

    </ul>

</div>



<div class="content-area">

    <div class="container-fluid p-4 text-center">

        <h3>Dashboard</h3>
        <p>Welcome back, <span class="username"></span> 👋</p>

        
        <div class="row justify-content-center mt-4">

            <div class="col-md-4">
                <div class="card stat-card mb-3" onclick="goToMessages()">
                    <h4 id="totalMessages">0</h4>
                    <p>Messages</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card stat-card mb-3" onclick="goToSaved()">
                    <h4 id="totalSaved">0</h4>
                    <p>Saved Items</p>
                </div>
            </div>

        </div>

        
        <div class="mt-5">
            <button class="btn btn-success btn-lg" onclick="browseProducts()">
                <i class="bi bi-search"></i> Browse Products
            </button>
        </div>

    </div>

</div>

<script src="js/seller.js"></script> 

<script>
function logout() {
    localStorage.removeItem('user');
    window.location.href = "login.html";
}

function goToMessages() {
    window.location.href = "chat.html";
}

function goToSaved() {
    window.location.href = "saved.html";
}

function browseProducts() {
    window.location.href = "products.html"; 
}
</script>

</body>
</html>
