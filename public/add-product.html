<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/add-product.css">
</head>

<body class="add-bg">


<nav class="navbar navbar-light bg-white shadow-sm px-4">
    <span class="navbar-brand fw-bold text-success fs-4">
        <i class="bi bi-cart"></i> Student Marketplace
    </span>

    <a href="seller-dashboard.html" class="btn btn-outline-success btn-sm">
        ← Back to Dashboard
    </a>
</nav>


<div class="add-container mt-5 pt-5">

    <div class="add-card">

        <h3 class="text-center fw-bold mb-3">Sell Your Product</h3>
        <p class="text-center text-muted">Fill the details below</p>

        <form id="addProductForm">

            <div class="mb-3">
                <label>Product Title</label>
                <input type="text" id="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Price (৳)</label>
                <input type="number" id="price" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Category</label>
                <select id="category" class="form-control" required>
                    <option value="">Select Category</option>
                    <option value="books">Books</option>
                    <option value="electronics">Electronics</option>
                    <option value="furniture">Furniture</option>
                    <option value="others">Others</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Image (file name)</label>
                <input type="file" id="image" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
            </div>

            <button class="btn btn-success w-100">Add Product</button>

        </form>

    </div>

</div>

<script src="js/add-product.js"></script>

</body>
</html>
